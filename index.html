<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ Quiz</title>
    <style>
        /* Reuse the same style as kanji/quiz_detail.html */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .home-container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            text-align: center;
        }

        h1 {
            color: #2d3748;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .nav-btn {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin: 8px;
            width: 200px;
        }

        .nav-btn:hover {
            background-color: #5a67d8;
        }
    </style>
</head>
<body>
    <div class="home-container">
        <h1>Chào mừng tới Quiz</h1>
        <button class="nav-btn" onclick="location.href='kanji/list.html'">漢字</button>
        <button class="nav-btn" onclick="location.href='onaji_kotoba/list.html'">同じ言葉</button>
        <button class="nav-btn" onclick="location.href='kome/list.html'">コメ</button>
    </div>
</body>
</html>
